# Base config shared by all custom RULER tasks for PoST evaluation.
# Evaluates at 2048 context length with Llama-3.1-8B tokenizer.
tag:
  - longcxt
dataset_path: ""
dataset_name: ""
output_type: generate_until
test_split: test
doc_to_text: "{{input}}"
doc_to_target: "{{outputs}}"
gen_prefix: "{{gen_prefix}}"
target_delimiter: " "
process_results: !function common_utils.process_results
metric_list:
  - metric: "2048"
    aggregation: !function common_utils.aggregate_metrics
    higher_is_better: true
generation_kwargs:
  do_sample: false
  temperature: 0.0
  max_gen_toks: 128
  until: []
repeats: 1
metadata:
  version: 1.0
  tokenizer: meta-llama/Llama-3.1-8B
  max_seq_lengths:
    - 2048
