tag:
  - longcxt
task: post_niah_multikey_1
dataset_path: ""
dataset_name: ""
output_type: generate_until
test_split: test
custom_dataset: !function niah_utils.niah_multikey_1
doc_to_text: "{{input}}"
doc_to_target: "{{outputs}}"
gen_prefix: "{{gen_prefix}}"
target_delimiter: " "
process_results: !function common_utils.process_results
metric_list:
  - metric: "1024"
    aggregation: !function common_utils.aggregate_metrics
    higher_is_better: true
  - metric: "2048"
    aggregation: !function common_utils.aggregate_metrics
    higher_is_better: true
generation_kwargs:
  do_sample: false
  temperature: 0.0
  max_gen_toks: 128
  until: []
repeats: 1
metadata:
  version: 1.0
  tokenizer: meta-llama/Llama-3.1-8B
  max_seq_lengths:
    - 1024
    - 2048
    - 4096
